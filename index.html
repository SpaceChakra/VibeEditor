<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeEditor Holodeck</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2315171c'/%3E%3Cpath d='M12 18h40v28H12z' fill='none' stroke='%23f0c987' stroke-width='4'/%3E%3Cpath d='M22 28h20M22 38h20' stroke='%2350b8ff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #15171c; color: #e6eaf0; font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; }
    #app { position: relative; width: 100vw; height: 100vh; }
    #stage { position: absolute; inset: 0; }
    #stage canvas { display: block; width: 100%; height: 100%; }
    #hud { position: absolute; left: 16px; right: 86px; top: 16px; display: flex; align-items: flex-start; pointer-events: none; }
    #brand { width: min(420px, 100%); padding: 10px 12px; background: rgba(20, 23, 30, 0.82); border: 1px solid rgba(240, 201, 135, 0.35); border-radius: 8px; backdrop-filter: blur(8px); pointer-events: auto; }
    #brand h1 { margin: 0 0 6px; font-size: 14px; color: #f0c987; letter-spacing: 0; }
    #poseSelect { min-height: 34px; color: #d8dce3; border-color: rgba(122, 134, 156, 0.35); background: rgba(17, 19, 26, 0.72); font-size: 11px; white-space: normal; overflow-wrap: anywhere; }
    #controlPanel { --panel-handle-height: 38px; --panel-tab-height: 84px; --panel-open-height: min(34vh, 270px); --panel-expanded-height: min(58vh, 500px); --panel-height: var(--panel-open-height); position: absolute; left: 16px; right: 16px; bottom: max(16px, env(safe-area-inset-bottom)); height: var(--panel-height); background: rgba(20, 23, 30, 0.9); border: 1px solid rgba(122, 134, 156, 0.35); border-radius: 8px 8px 0 0; backdrop-filter: blur(10px); overflow: hidden; pointer-events: auto; transition: transform 180ms ease, height 180ms ease; }
    #controlPanel.is-collapsed { box-shadow: 0 -10px 26px rgba(0, 0, 0, 0.32); transform: translateY(calc(100% - var(--panel-tab-height))); }
    #controlPanel.is-expanded { --panel-height: var(--panel-expanded-height); }
    #panelHandle { width: 100%; height: 38px; display: grid; place-items: center; border: 0; border-bottom: 1px solid rgba(122, 134, 156, 0.24); background: rgba(17, 19, 26, 0.72); color: #d8dce3; font: inherit; cursor: pointer; touch-action: none; }
    #controlPanel.is-collapsed #panelHandle { background: rgba(20, 23, 30, 0.96); }
    #panelHandle::before { content: ""; width: 54px; height: 4px; border-radius: 999px; background: #d8dce3; opacity: 0.78; }
    #controls { max-width: 760px; margin: 0 auto; height: calc(var(--panel-height) - var(--panel-handle-height)); overflow-y: auto; overscroll-behavior: contain; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px max(14px, env(safe-area-inset-bottom)); scrollbar-width: thin; transition: height 180ms ease; }
    #controlPanel.is-collapsed #controls { visibility: hidden; }
    label { display: grid; gap: 4px; font-size: 10px; color: #9aa3b2; text-transform: uppercase; letter-spacing: 0; }
    select { width: 100%; background: #11131a; color: #e6eaf0; border: 1px solid #333a47; border-radius: 5px; padding: 7px 8px; font: inherit; font-size: 12px; }
    button { font: inherit; }
    .mini-button { min-height: 30px; padding: 6px 9px; background: #181c25; color: #e6eaf0; border: 1px solid #333a47; border-radius: 5px; cursor: pointer; font-size: 11px; }
    .mini-button:hover:not(:disabled), .mini-button:focus-visible:not(:disabled) { border-color: #f0c987; color: #f0c987; }
    .mini-button:disabled { color: #667082; cursor: not-allowed; opacity: 0.55; }
    .playlist-panel { grid-column: 1 / -1; display: grid; gap: 8px; padding: 10px; background: rgba(17, 19, 26, 0.68); border: 1px solid #333a47; border-radius: 6px; }
    .playlist-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: #9aa3b2; font-size: 10px; text-transform: uppercase; }
    .playlist-list { display: grid; gap: 8px; margin: 0; padding: 0; list-style: none; }
    .playlist-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 8px; background: #11131a; border: 1px solid #333a47; border-radius: 6px; }
    .playlist-item.is-active { border-color: rgba(240, 201, 135, 0.78); box-shadow: inset 3px 0 0 #f0c987; }
    .playlist-name-button { width: 100%; min-height: 34px; padding: 6px 8px; color: #e6eaf0; background: transparent; border: 0; text-align: left; cursor: pointer; }
    .playlist-name-button span { display: block; font-size: 12px; }
    .playlist-name-button small { display: block; margin-top: 2px; color: #7f8897; font-size: 10px; }
    .playlist-tools { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .modal { position: absolute; inset: 0; z-index: 20; display: grid; background: rgba(10, 12, 17, 0.84); backdrop-filter: blur(10px); pointer-events: auto; }
    .modal[hidden] { display: none; }
    .modal-panel { width: 100%; height: 100%; display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto; gap: 12px; padding: max(18px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom)); background: rgba(20, 23, 30, 0.96); }
    .modal-header { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; }
    .modal-header h2 { margin: 0; color: #f0c987; font-size: 16px; letter-spacing: 0; }
    #playlistNameInput { width: 100%; margin-top: 8px; padding: 9px 10px; color: #e6eaf0; background: #11131a; border: 1px solid #333a47; border-radius: 5px; font: inherit; font-size: 13px; }
    .modal-toolbar { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: end; }
    .modal-list { min-height: 0; overflow-y: auto; overscroll-behavior: contain; display: grid; align-content: start; gap: 8px; margin: 0; padding: 0 0 92px; list-style: none; scrollbar-width: thin; }
    .modal-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 8px; background: #11131a; border: 1px solid #333a47; border-radius: 6px; }
    .modal-row.is-active { border-color: rgba(240, 201, 135, 0.78); box-shadow: inset 3px 0 0 #f0c987; }
    .confirm-modal { place-items: center; padding: 18px; }
    .confirm-box { width: min(420px, 100%); display: grid; gap: 14px; padding: 16px; background: rgba(20, 23, 30, 0.98); border: 1px solid rgba(240, 201, 135, 0.35); border-radius: 8px; }
    .confirm-box h2 { margin: 0; color: #f0c987; font-size: 15px; }
    .confirm-box p { margin: 0; color: #d8dce3; font-size: 12px; line-height: 1.45; }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .danger-button { border-color: rgba(255, 96, 96, 0.58); color: #ff9c9c; }
    .danger-button:hover:not(:disabled), .danger-button:focus-visible:not(:disabled) { border-color: #ff9c9c; color: #ffd0d0; }
    .hud-icon { position: absolute; right: 18px; width: 42px; height: 42px; display: grid; place-items: center; padding: 0; background: rgba(20, 23, 30, 0.86); color: #f0c987; border: 1px solid rgba(240, 201, 135, 0.42); border-radius: 999px; backdrop-filter: blur(8px); cursor: pointer; pointer-events: auto; transition: background 140ms ease, border-color 140ms ease, transform 140ms ease; }
    .hud-icon:hover, .hud-icon:focus-visible { background: rgba(32, 36, 46, 0.94); border-color: rgba(240, 201, 135, 0.82); transform: translateY(-1px); }
    .hud-icon svg { width: 20px; height: 20px; fill: currentColor; }
    #pauseToggle { top: 18px; }
    #editorLink { top: 68px; text-decoration: none; }
    #loadingSpinner { position: absolute; left: 50%; top: 43%; width: 34px; height: 34px; margin: -17px 0 0 -17px; border: 3px solid rgba(216, 220, 227, 0.28); border-top-color: #f0c987; border-radius: 999px; opacity: 0; visibility: hidden; pointer-events: none; animation: spin 760ms linear infinite; transition: opacity 120ms ease, visibility 120ms ease; }
    #loadingSpinner.is-loading { opacity: 1; visibility: visible; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 760px) {
      #hud { top: 14px; left: 14px; right: 74px; }
      .hud-icon { right: 16px; width: 46px; height: 46px; }
      #pauseToggle { top: 16px; }
      #editorLink { top: 70px; }
      #loadingSpinner { top: 40%; }
      #controlPanel { --panel-handle-height: 36px; --panel-tab-height: 96px; --panel-open-height: min(36vh, 260px); --panel-expanded-height: min(68vh, 560px); left: 10px; right: 10px; bottom: max(42px, calc(env(safe-area-inset-bottom) + 16px)); }
      #controlPanel.is-collapsed { transform: translateY(calc(100% - var(--panel-tab-height))); }
      #panelHandle { height: 36px; }
      #controls { grid-template-columns: 1fr; height: calc(var(--panel-height) - var(--panel-handle-height)); padding: 10px 14px max(96px, calc(env(safe-area-inset-bottom) + 72px)); scroll-padding-bottom: 96px; }
      .playlist-header { align-items: flex-start; flex-direction: column; }
      .playlist-item { grid-template-columns: 1fr; }
      .modal-toolbar { grid-template-columns: 1fr; }
      .modal-row { grid-template-columns: 1fr; }
      .playlist-tools { justify-content: flex-start; }
      #brand { width: min(100%, 420px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage"></div>
    <div id="hud">
      <div id="brand">
        <h1>VibeEditor Holodeck</h1>
        <select id="poseSelect" aria-label="Animation / Pose"></select>
      </div>
    </div>
    <div id="loadingSpinner" aria-label="Loading"></div>
    <button id="pauseToggle" class="hud-icon" type="button" aria-label="Pause animation" aria-pressed="false">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 5h3v14H7zM14 5h3v14h-3z"></path>
      </svg>
    </button>
    <a id="editorLink" class="hud-icon" href="./editor.html" aria-label="Open editor" title="Open editor">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 5h9v2H7v10h10v-7h2v9H5z"></path>
        <path d="M13.7 12.7 12 14.4V16h1.6l1.7-1.7 4.8-4.8-1.6-1.6z"></path>
        <path d="m19.2 5.2 1.6 1.6-1 1-1.6-1.6z"></path>
      </svg>
    </a>
    <div id="controlPanel" class="is-open">
      <button id="panelHandle" type="button" aria-label="Collapse controls" aria-expanded="true"></button>
      <div id="controls">
        <label>
          Character
          <select id="characterSelect"></select>
        </label>
        <label>
          Level Design
          <select id="levelSelect"></select>
        </label>
        <section class="playlist-panel" aria-label="Animation playlist">
          <div class="playlist-header">
            <span>Playlists</span>
            <button id="playlistCreateButton" class="mini-button" type="button">New list</button>
          </div>
          <ol id="playlistList" class="playlist-list"></ol>
        </section>
      </div>
    </div>
    <div id="playlistModal" class="modal" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="playlistModalTitle">
        <header class="modal-header">
          <div>
            <h2 id="playlistModalTitle">Edit Playlist</h2>
            <input id="playlistNameInput" type="text" aria-label="Playlist name" />
          </div>
          <button id="playlistCloseButton" class="mini-button" type="button">Done</button>
        </header>
        <div class="modal-toolbar">
          <label>
            Add Pose
            <select id="playlistPoseSelect"></select>
          </label>
          <button id="playlistModalAddButton" class="mini-button" type="button">Add pose</button>
        </div>
        <ol id="playlistPoseList" class="modal-list"></ol>
        <button id="playlistDoneButton" class="mini-button" type="button">Done</button>
      </section>
    </div>
    <div id="deleteConfirmModal" class="modal confirm-modal" hidden>
      <section class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
        <h2 id="deleteConfirmTitle">Delete playlist?</h2>
        <p id="deleteConfirmText">This playlist will be removed.</p>
        <div class="confirm-actions">
          <button id="deleteCancelButton" class="mini-button" type="button">Cancel</button>
          <button id="deleteConfirmButton" class="mini-button danger-button" type="button">Delete</button>
        </div>
      </section>
    </div>
  </div>
  <script type="module" src="/src/holodeck.ts"></script>
</body>
</html>
