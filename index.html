<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeEditor Holodeck</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2315171c'/%3E%3Cpath d='M12 18h40v28H12z' fill='none' stroke='%23f0c987' stroke-width='4'/%3E%3Cpath d='M22 28h20M22 38h20' stroke='%2350b8ff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #15171c; color: #e6eaf0; font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; }
    #app { position: relative; width: 100vw; height: 100vh; }
    #stage { position: absolute; inset: 0; }
    #stage canvas { display: block; width: 100%; height: 100%; }
    #hud { position: absolute; left: 16px; right: 16px; top: 16px; display: flex; align-items: flex-start; pointer-events: none; }
    #brand { padding: 10px 12px; background: rgba(20, 23, 30, 0.82); border: 1px solid rgba(240, 201, 135, 0.35); border-radius: 8px; backdrop-filter: blur(8px); pointer-events: auto; }
    #brand h1 { margin: 0 0 4px; font-size: 14px; color: #f0c987; letter-spacing: 0; }
    #poseStatus { font-size: 11px; color: #aab4c3; }
    #controlPanel { --panel-handle-height: 38px; --panel-tab-height: 84px; position: absolute; left: 16px; right: 16px; bottom: max(16px, env(safe-area-inset-bottom)); max-height: min(34vh, 270px); background: rgba(20, 23, 30, 0.9); border: 1px solid rgba(122, 134, 156, 0.35); border-radius: 8px 8px 0 0; backdrop-filter: blur(10px); overflow: hidden; pointer-events: auto; transition: transform 180ms ease; }
    #controlPanel.is-collapsed { box-shadow: 0 -10px 26px rgba(0, 0, 0, 0.32); transform: translateY(calc(100% - var(--panel-tab-height))); }
    #panelHandle { width: 100%; height: 38px; display: grid; place-items: center; border: 0; border-bottom: 1px solid rgba(122, 134, 156, 0.24); background: rgba(17, 19, 26, 0.72); color: #d8dce3; font: inherit; cursor: pointer; touch-action: none; }
    #controlPanel.is-collapsed #panelHandle { background: rgba(20, 23, 30, 0.96); }
    #panelHandle::before { content: ""; width: 54px; height: 4px; border-radius: 999px; background: #d8dce3; opacity: 0.78; }
    #controls { max-width: 760px; margin: 0 auto; max-height: calc(min(34vh, 270px) - var(--panel-handle-height)); overflow-y: auto; overscroll-behavior: contain; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px max(14px, env(safe-area-inset-bottom)); scrollbar-width: thin; }
    #controlPanel.is-collapsed #controls { visibility: hidden; }
    label { display: grid; gap: 4px; font-size: 10px; color: #9aa3b2; text-transform: uppercase; letter-spacing: 0; }
    select { width: 100%; background: #11131a; color: #e6eaf0; border: 1px solid #333a47; border-radius: 5px; padding: 7px 8px; font: inherit; font-size: 12px; }
    .toggle-row { display: flex; align-items: center; gap: 8px; min-height: 33px; padding: 7px 8px; background: #11131a; border: 1px solid #333a47; border-radius: 5px; color: #d8dce3; font-size: 12px; text-transform: none; }
    .toggle-row input { width: 16px; height: 16px; accent-color: #f0c987; }
    #editorLink { display: inline-flex; align-items: center; min-height: 24px; color: #f0c987; text-decoration: none; font-size: 11px; }
    #editorLink:hover { text-decoration: underline; }
    #loadingSpinner { position: absolute; top: 18px; right: 18px; width: 18px; height: 18px; border: 2px solid rgba(216, 220, 227, 0.28); border-top-color: #f0c987; border-radius: 999px; opacity: 0; visibility: hidden; pointer-events: none; animation: spin 760ms linear infinite; transition: opacity 120ms ease, visibility 120ms ease; }
    #loadingSpinner.is-loading { opacity: 1; visibility: visible; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 760px) {
      #hud { top: 14px; }
      #controlPanel { --panel-handle-height: 36px; --panel-tab-height: 96px; left: 10px; right: 10px; bottom: max(16px, env(safe-area-inset-bottom)); max-height: min(31vh, 220px); }
      #controlPanel.is-collapsed { transform: translateY(calc(100% - var(--panel-tab-height))); }
      #panelHandle { height: 36px; }
      #controls { grid-template-columns: 1fr; max-height: calc(min(31vh, 220px) - var(--panel-handle-height)); padding: 10px 14px max(12px, env(safe-area-inset-bottom)); }
      #brand { width: fit-content; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage"></div>
    <div id="hud">
      <div id="brand">
        <h1>VibeEditor Holodeck</h1>
        <div id="poseStatus">Loading</div>
        <a id="editorLink" href="./editor.html">Go to Editor</a>
      </div>
    </div>
    <div id="loadingSpinner" aria-label="Loading"></div>
    <div id="controlPanel" class="is-open">
      <button id="panelHandle" type="button" aria-label="Collapse controls" aria-expanded="true"></button>
      <div id="controls">
        <label>
          Character
          <select id="characterSelect"></select>
        </label>
        <label>
          Animation / Pose
          <select id="poseSelect"></select>
        </label>
        <label>
          Level Design
          <select id="levelSelect"></select>
        </label>
        <label class="toggle-row">
          <input id="pauseToggle" type="checkbox" />
          Pause animation
        </label>
        <label class="toggle-row">
          <input id="repeatToggle" type="checkbox" />
          Repeat current animation
        </label>
      </div>
    </div>
  </div>
  <script type="module" src="/src/holodeck.ts"></script>
</body>
</html>
